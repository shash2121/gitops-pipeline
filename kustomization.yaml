apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Shared infrastructure
  - k8s/01-secret-provider.yaml
  - k8s/02-configmap.yaml
  - k8s/03-service-accounts.yaml
  - k8s/04-rds-init-job.yaml
  - k8s/05-external-services.yaml
  - k8s/06-ingress.yaml

  # Services (use Helm charts via ArgoCD, or apply manually with helm template)
  # To deploy manually without ArgoCD:
  #   helm template ui services/ui/chart -f services/ui/chart/values-ui.yaml | kubectl apply -f -
  #   helm template auth services/auth-service/chart -f services/auth-service/chart/values-auth.yaml | kubectl apply -f -
  #   helm template url services/url-service/chart -f services/url-service/chart/values-url.yaml | kubectl apply -f -
  #   helm template analytics services/analytics-service/chart -f services/analytics-service/chart/values-analytics.yaml | kubectl apply -f -
  #   helm template cleanup services/cleanup-worker/chart -f services/cleanup-worker/chart/values-cleanup.yaml | kubectl apply -f -
