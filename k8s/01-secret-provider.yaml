apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: linkshrink-aws-secrets
  namespace: default
spec:
  provider: aws
  parameters:
    region: us-east-1
    usePodIdentity: "true"
    objects: |
      - objectName: "dev-rds-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "JWT_SECRET"
            objectAlias: "JWT_SECRET"
          - path: "DB_USERNAME"
            objectAlias: "DB_USERNAME"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
  secretObjects:
    - secretName: linkshrink-aws-secret
      type: Opaque
      data:
        - key: JWT_SECRET
          objectName: JWT_SECRET
        - key: DB_USERNAME
          objectName: DB_USERNAME
        - key: DB_PASSWORD
          objectName: DB_PASSWORD
