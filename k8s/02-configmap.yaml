apiVersion: v1
kind: ConfigMap
metadata:
  name: linkshrink-config
data:
  # RDS
  DB_HOST: "rds-postgres"
  DB_PORT: "5432"
  DB_NAME: "urlshortener"

  # ElastiCache Redis
  REDIS_URL: "redis://redis-cache:6379"

  # SQS
  SQS_VISIT_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/311902596413/linkshrink-orders-queue"

  # App config
  JWT_EXPIRES_IN: "15m"
  REFRESH_TOKEN_EXPIRES_IN: "7d"
  AUTH_PORT: "3001"
  URL_PORT: "3002"
  ANALYTICS_PORT: "3003"
  CLEANUP_PORT: "3004"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  BASE_URL: "http://localhost"
  AWS_REGION: "us-east-1"
