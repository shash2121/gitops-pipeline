name: Build and Push Auth Service to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/auth-service/**"

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: linkshrink-auth
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: gitops-push
  cancel-in-progress: false

jobs:
  build-and-push-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::311902596413:role/github-actions-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV
          echo "TAGS=latest $SHA_TAG" >> $GITHUB_ENV

      - name: Build and push Docker images
        run: |
          for tag in $TAGS; do
            IMAGE_URI="$IMAGE_BASE:$tag"
            echo "Building and pushing $IMAGE_URI"
            docker build -t $IMAGE_URI services/auth-service
            docker push $IMAGE_URI
          done

      - name: Setup Git auth using GITHUB_TOKEN
        run: |
          git config --global user.name "shashwat-ci""
          git config --global user.email "ci@shashwat"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Update Helm values file with new image tag
        run: |
          cd services/auth-service
          sed -i "s|^  tag: .*|  tag: sha-${GITHUB_SHA::7}|" chart/values-auth.yaml
          git diff --quiet || (
            git add chart/values-auth.yaml
            git commit -m "Update Auth Service image tag to sha-${GITHUB_SHA::7}"
            git push origin main
          )
